version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: siscar-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Admin1234!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - siscar-db-data:/var/opt/mssql
      - ./siscar-backend/src/main/resources/SiscarV2.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./siscar-backend
    container_name: siscar-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://db:1433;databaseName=SiscarV2;trustServerCertificate=true;encrypt=false
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: Admin1234!
    depends_on:
      - db

  frontend:
    build: ./siscar-frontend
    container_name: siscar-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  siscar-db-data: